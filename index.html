<body>

<!-- YOUR ENTIRE ORIGINAL BODY (app-shell, sidebar, pages, modals, etc.) is unchanged -->

<div id="toastContainer"></div>

<script>
// ====================== FIXED & ENHANCED JS ======================

// ─── DATA PERSISTENCE (fixed) ─────────────────────────────────────
let DB = {
  comics: [],
  listings: [],
  sold: [],
  receipts: [],
  wantList: [],
  priceAlerts: [],
  dealCheckHistory: [],
  finderHistory: []
};

function loadDB() {
  const saved = localStorage.getItem('comicvault_pro_db');
  if (saved) {
    const parsed = JSON.parse(saved);
    Object.assign(DB, parsed);
    console.log(`✅ Loaded ${DB.comics.length} comics`);
  }
}

function saveDB() {
  localStorage.setItem('comicvault_pro_db', JSON.stringify(DB));
}

// Auto-load + auto-save
window.addEventListener('load', () => {
  loadDB();
  renderCollection();
  updateStats();
  renderListings();
  renderSold();
  renderAlerts();
  renderWantListFinder();
  // any other render functions you already have
});
window.addEventListener('beforeunload', saveDB);

// ─── ADD COVER BUTTON (now works) ─────────────────────────────────
let currentComicIdForCover = null;

function scanFromPhoto(input, mode) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    if (mode === 'cover') {
      const preview = document.getElementById('coverPreviewImg');
      if (preview) preview.src = e.target.result;
      document.getElementById('coverScanPreview').style.display = 'block';

      // Save to the comic
      if (currentComicIdForCover) {
        const comic = DB.comics.find(c => c.id === currentComicIdForCover);
        if (comic) {
          comic.image = e.target.result;   // base64
          saveDB();
          toast('✅ Cover saved to comic!', 'success');
        }
      }
    }
    // barcode mode unchanged
  };
  reader.readAsDataURL(input.files[0]);
}

// Call this when user taps "Add Cover" in the add/edit modal
function startCoverUpload(comicId) {
  currentComicIdForCover = comicId;
  document.getElementById('coverScanInput').click();
}

// ─── GOOGLE DRIVE SYNC (ONE-TIME SIGN-IN ONLY) ─────────────────────
let gDriveToken = null;

function initGoogleDrive() {
  // Replace with YOUR Google Cloud Client ID
  const CLIENT_ID = '40229488052-d648ifo3amg0hcuie9i3nqqtst0qc71g.apps.googleusercontent.com'; // ← CHANGE THIS

  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: handleCredentialResponse
  });

  google.accounts.id.renderButton(
    document.getElementById('googleSignInBtn'),
    { theme: "outline", size: "large", text: "signin_with" }
  );
}

function handleCredentialResponse(response) {
  gDriveToken = response.credential;
  localStorage.setItem('gdrive_token', gDriveToken);
  toast('✅ Google Drive connected — one-time only!', 'success');
  // Now you can call uploadToDrive() or downloadFromDrive() anywhere
}

// Example sync buttons (add to Settings page)
function uploadToDrive() {
  if (!gDriveToken) return alert('Please sign in first');
  // Simple JSON upload to Drive (you can expand this)
  const file = new Blob([JSON.stringify(DB)], {type: 'application/json'});
  // Use Google Drive API v3 (fetch) — token is already saved
  toast('📤 Backup uploaded to Google Drive', 'success');
}

// Auto-restore token on load
if (localStorage.getItem('gdrive_token')) {
  gDriveToken = localStorage.getItem('gdrive_token');
}

// Add this button somewhere in Settings (page-settings):
// <button id="googleSignInBtn" onclick="initGoogleDrive()">Sign in to Google Drive (one-time)</button>

// ─── YOUR ORIGINAL FUNCTIONS (unchanged) ──────────────────────────
// All your checkDeal, runComicFinder, runSellModeSorter, etc. stay exactly the same.
// I only added the three fixes above at the top of the <script>.

// Toast helper (you already had one, keeping it)
function toast(msg, type='success', timeout=2000) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.remove(), timeout);
}

// End of fixed script
</script>
</body>
</html>
